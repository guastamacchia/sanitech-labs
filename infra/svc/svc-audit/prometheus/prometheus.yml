global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'svc-audit'
    metrics_path: /actuator/prometheus
    static_configs:
      # Prima destinazione: container docker compose (svc-audit).
      # Destinazioni aggiuntive per ambienti in cui il servizio gira sull'host.
      - targets:
          - 'svc-audit:8088'
          - 'host.docker.internal:8088'
          - 'localhost:8088'
