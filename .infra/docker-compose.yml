  # =========================
  # Microservices (built from ../sanitech-svc/*)
  # =========================
  # NOTE: TESTCONTAINERS_DOCKER_HOST is optional and only used for integration tests.
  svc-gateway:
    build:
      context: ../sanitech-svc/svc-gateway
      dockerfile: src/main/docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DATABASE_NAME: ${GATEWAY_DATABASE_NAME:-sanitech_gateway}
      DATABASE_USER: ${DATABASE_USER:-sanitech}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-sanitech}
      DB_URL: ${GATEWAY_DB_URL:-jdbc:postgresql://pg-gateway:5432/sanitech_gateway}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_ADVERTISED_HOST: ${KAFKA_ADVERTISED_HOST}
      CLUSTER_ID: ${CLUSTER_ID}
      KAFKA_PRODUCER_RETRIES: ${KAFKA_PRODUCER_RETRIES}
      KAFKA_PRODUCER_ACKS: ${KAFKA_PRODUCER_ACKS}
      KAFKA_PRODUCER_LINGER_MS: ${KAFKA_PRODUCER_LINGER_MS}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: ${KC_HEALTH_ENABLED}
      OAUTH2_ISSUER_URI: ${OAUTH2_ISSUER_URI:-http://keycloak:8080/realms/sanitech}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${OAUTH2_ISSUER_URI:-http://keycloak:8080/realms/sanitech}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      SERVICE_URL: ${GATEWAY_SERVICE_URL}
      KEYCLOAK_URL: ${KEYCLOAK_URL}
      PROMETHEUS_URL: ${PROMETHEUS_URL}
      GRAFANA_URL: ${GRAFANA_URL}
      DIRECTORY_URL: ${GATEWAY_DIRECTORY_URL:-http://svc-directory:8082}
      SCHEDULING_URL: ${GATEWAY_SCHEDULING_URL:-http://svc-scheduling:8083}
      ADMISSIONS_URL: ${GATEWAY_ADMISSIONS_URL:-http://svc-admissions:8084}
      CONSENTS_URL: ${GATEWAY_CONSENTS_URL:-http://svc-consents:8085}
      DOCS_URL: ${GATEWAY_DOCS_URL:-http://svc-docs:8086}
      NOTIFICATIONS_URL: ${GATEWAY_NOTIFICATIONS_URL:-http://svc-notifications:8087}
      AUDIT_URL: ${GATEWAY_AUDIT_URL:-http://svc-audit:8088}
      TELEVISIT_URL: ${GATEWAY_TELEVISIT_URL:-http://svc-televisit:8089}
      PAYMENTS_URL: ${GATEWAY_PAYMENTS_URL:-http://svc-payments:8090}
      PRESCRIBING_URL: ${GATEWAY_PRESCRIBING_URL:-http://svc-prescribing:8091}
      OPENAPI_DIRECTORY_URL: ${GATEWAY_OPENAPI_DIRECTORY_URL:-http://svc-directory:8082/v3/api-docs/directory}
      OPENAPI_SCHEDULING_URL: ${GATEWAY_OPENAPI_SCHEDULING_URL:-http://svc-scheduling:8083/v3/api-docs/scheduling}
      OPENAPI_ADMISSIONS_URL: ${GATEWAY_OPENAPI_ADMISSIONS_URL:-http://svc-admissions:8084/v3/api-docs/admissions}
      OPENAPI_CONSENTS_URL: ${GATEWAY_OPENAPI_CONSENTS_URL:-http://svc-consents:8085/v3/api-docs/consents}
      OPENAPI_DOCS_URL: ${GATEWAY_OPENAPI_DOCS_URL:-http://svc-docs:8086/v3/api-docs/docs}
      OPENAPI_NOTIFICATIONS_URL: ${GATEWAY_OPENAPI_NOTIFICATIONS_URL:-http://svc-notifications:8087/v3/api-docs/notifications}
      OPENAPI_AUDIT_URL: ${GATEWAY_OPENAPI_AUDIT_URL:-http://svc-audit:8088/v3/api-docs/audit}
      OPENAPI_TELEVISIT_URL: ${GATEWAY_OPENAPI_TELEVISIT_URL:-http://svc-televisit:8089/v3/api-docs/televisit}
      OPENAPI_PAYMENTS_URL: ${GATEWAY_OPENAPI_PAYMENTS_URL:-http://svc-payments:8090/v3/api-docs/payments}
      OPENAPI_PRESCRIBING_URL: ${GATEWAY_OPENAPI_PRESCRIBING_URL:-http://svc-prescribing:8091/v3/api-docs/prescribing}
      TESTCONTAINERS_DOCKER_HOST: ${TESTCONTAINERS_DOCKER_HOST}
    depends_on:
      pg-gateway:
        condition: service_healthy
      kafka:
