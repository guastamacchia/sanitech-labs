      KC_HEALTH_ENABLED: ${KC_HEALTH_ENABLED}
      OAUTH2_ISSUER_URI: ${OAUTH2_ISSUER_URI:-http://keycloak:8080/realms/sanitech}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
