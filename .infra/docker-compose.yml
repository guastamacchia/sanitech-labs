    environment:
      SPRING_PROFILES_ACTIVE: ${DIRECTORY_SPRING_PROFILES_ACTIVE}
      DATABASE_HOST: ${DIRECTORY_DATABASE_HOST:-pg-directory}
      DATABASE_PORT: ${DIRECTORY_DATABASE_PORT:-5432}
      DATABASE_NAME: ${DIRECTORY_DATABASE_NAME:-sanitech_directory}
      DATABASE_USER: ${DATABASE_USER:-sanitech}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-sanitech}
      DB_URL: ${DIRECTORY_DB_URL:-jdbc:postgresql://pg-directory:5432/sanitech_directory}
      DB_USER: ${DATABASE_USER:-sanitech}
      DB_PASSWORD: ${DATABASE_PASSWORD:-sanitech}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_HOST: ${DIRECTORY_KAFKA_HOST}
      KAFKA_ADVERTISED_HOST: ${KAFKA_ADVERTISED_HOST}
      KAFKA_PORT: ${DIRECTORY_KAFKA_PORT}
      CLUSTER_ID: ${CLUSTER_ID}
      KAFKA_PRODUCER_ACKS: ${KAFKA_PRODUCER_ACKS}
      KAFKA_PRODUCER_RETRIES: ${KAFKA_PRODUCER_RETRIES}
      KAFKA_PRODUCER_LINGER_MS: ${KAFKA_PRODUCER_LINGER_MS}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: ${KC_HEALTH_ENABLED}
      OAUTH2_SCHEME: ${DIRECTORY_OAUTH2_SCHEME}
      OAUTH2_HOST: ${DIRECTORY_OAUTH2_HOST}
      OAUTH2_PORT: ${DIRECTORY_OAUTH2_PORT}
      OAUTH2_REALM: ${DIRECTORY_OAUTH2_REALM}
      OAUTH2_ISSUER_URI: ${OAUTH2_ISSUER_URI:-http://keycloak:8080/realms/sanitech}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      SERVICE_URL: ${DIRECTORY_SERVICE_URL}
      KEYCLOAK_URL: ${KEYCLOAK_URL}
      PROMETHEUS_URL: ${PROMETHEUS_URL}
      GRAFANA_URL: ${GRAFANA_URL}
      RESILIENCE4J_RATELIMITER_INSTANCES_DIRECTORYAPI_LIMITFORPERIOD: ${DIRECTORY_RESILIENCE4J_RATELIMITER_INSTANCES_DIRECTORYAPI_LIMITFORPERIOD}
      RESILIENCE4J_RATELIMITER_INSTANCES_DIRECTORYAPI_LIMITREFRESHPERIOD: ${DIRECTORY_RESILIENCE4J_RATELIMITER_INSTANCES_DIRECTORYAPI_LIMITREFRESHPERIOD}
      RESILIENCE4J_RATELIMITER_INSTANCES_DIRECTORYAPI_TIMEOUTDURATION: ${DIRECTORY_RESILIENCE4J_RATELIMITER_INSTANCES_DIRECTORYAPI_TIMEOUTDURATION}
      RESILIENCE4J_BULKHEAD_INSTANCES_DIRECTORYREAD_MAXCONCURRENTCALLS: ${DIRECTORY_RESILIENCE4J_BULKHEAD_INSTANCES_DIRECTORYREAD_MAXCONCURRENTCALLS}
      RESILIENCE4J_BULKHEAD_INSTANCES_DIRECTORYREAD_MAXWAITDURATION: ${DIRECTORY_RESILIENCE4J_BULKHEAD_INSTANCES_DIRECTORYREAD_MAXWAITDURATION}
    depends_on:
      pg-directory:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'exec 3<>/dev/tcp/127.0.0.1/8082'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 25s
    restart: unless-stopped

  svc-scheduling:
