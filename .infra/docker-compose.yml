      DB_URL: ${ADMISSIONS_DB_URL:-jdbc:postgresql://pg-admissions:5432/sanitech_admissions}
      DB_USER: ${DATABASE_USER:-sanitech}
      DB_PASSWORD: ${DATABASE_PASSWORD:-sanitech}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_ADVERTISED_HOST: ${KAFKA_ADVERTISED_HOST}
      CLUSTER_ID: ${CLUSTER_ID}
      KAFKA_PRODUCER_RETRIES: ${KAFKA_PRODUCER_RETRIES}
      KAFKA_PRODUCER_ACKS: ${KAFKA_PRODUCER_ACKS}
      KAFKA_PRODUCER_LINGER_MS: ${KAFKA_PRODUCER_LINGER_MS}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: ${KC_HEALTH_ENABLED}
      OAUTH2_ISSUER_URI: ${OAUTH2_ISSUER_URI:-http://keycloak:8080/realms/sanitech}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
