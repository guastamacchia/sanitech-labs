global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape dei servizi backend in esecuzione nella compose.
  - job_name: backend-services
    metrics_path: /actuator/prometheus
    scrape_interval: 30s
    static_configs:
      - targets:
          - "svc-gateway:8080"
          - "svc-directory:8082"
          - "svc-scheduling:8083"
          - "svc-admissions:8084"
          - "svc-consents:8085"
          - "svc-docs:8086"
          - "svc-notifications:8087"
          - "svc-audit:8088"
          - "svc-televisit:8089"
          - "svc-payments:8090"
          - "svc-prescribing:8091"

  # Target host/local per i servizi in esecuzione fuori dalla compose.
  - job_name: svc-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "host.docker.internal:8080"
          - "localhost:8080"

  - job_name: svc-directory
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "host.docker.internal:8082"
          - "localhost:8082"

  - job_name: svc-scheduling
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "host.docker.internal:8083"
          - "localhost:8083"

  - job_name: svc-admissions
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "host.docker.internal:8084"
          - "localhost:8084"

  - job_name: svc-consents
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "host.docker.internal:8085"
          - "localhost:8085"

  - job_name: svc-docs
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "host.docker.internal:8086"
          - "localhost:8086"

  - job_name: svc-notifications
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "host.docker.internal:8087"
          - "localhost:8087"

  - job_name: svc-audit
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "host.docker.internal:8088"
          - "localhost:8088"

  - job_name: svc-televisit
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "host.docker.internal:8089"
          - "localhost:8089"

  - job_name: svc-payments
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "host.docker.internal:8090"
          - "localhost:8090"

  - job_name: svc-prescribing
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "host.docker.internal:8091"
          - "localhost:8091"
