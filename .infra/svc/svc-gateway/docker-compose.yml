  services:

    # =========================
    # PostgreSQL
    # =========================
    postgres:
      image: postgres:16
      environment:
        POSTGRES_DB: ${GATEWAY_DATABASE_NAME}
        POSTGRES_USER: ${GATEWAY_DATABASE_USER}
        POSTGRES_PASSWORD: ${GATEWAY_DATABASE_PASSWORD}
      volumes:
        - sanitech_gateway_pgdata:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${GATEWAY_DATABASE_USER} -d ${GATEWAY_DATABASE_NAME}"]
        interval: 5s
        timeout: 5s
        retries: 10
      restart: unless-stopped

    # =========================
    # Kafka (KRaft)
    # =========================
    kafka:
      image: confluentinc/cp-kafka:7.7.1
      ports:
        - "29092:29092"
      environment:
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: broker,controller
        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
        KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://${GATEWAY_KAFKA_ADVERTISED_HOST}:29092
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
        KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
        CLUSTER_ID: ${GATEWAY_CLUSTER_ID}
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
        KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      healthcheck:
        test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:9092 >/dev/null 2>&1 || exit 1"]
        interval: 10s
        timeout: 10s
        retries: 30
        start_period: 60s
      restart: unless-stopped

    # =========================
    # Keycloak
    # =========================
    keycloak:
      build:
        context: ./keycloak
      image: sanitech/keycloak-gateway:${GATEWAY_SPRING_PROFILES_ACTIVE}
      environment:
        KEYCLOAK_ADMIN: ${GATEWAY_KEYCLOAK_ADMIN}
        KEYCLOAK_ADMIN_PASSWORD: ${GATEWAY_KEYCLOAK_ADMIN_PASSWORD}
        KC_HEALTH_ENABLED: ${GATEWAY_KC_HEALTH_ENABLED}
      ports:
        - "8081:8080"
      healthcheck:
        test: ["CMD-SHELL", "sh -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
        interval: 10s
        timeout: 5s
        retries: 30
        start_period: 40s
      restart: unless-stopped

    # =====================================================
    # svc-gateway
    # =====================================================
    svc-gateway:
      build:
        context: ..
        dockerfile: infra/Dockerfile
        args:
          JAR_FILE: target/*.jar
      image: sanitech/${SVC_NAME:-svc-gateway}:${GATEWAY_SPRING_PROFILES_ACTIVE}
      depends_on:
        postgres:
          condition: service_healthy
        kafka:
          condition: service_healthy
        keycloak:
          condition: service_healthy
      environment:
        SPRING_PROFILES_ACTIVE: ${GATEWAY_SPRING_PROFILES_ACTIVE}
        DATABASE_NAME: ${GATEWAY_DATABASE_NAME}
        DATABASE_USER: ${GATEWAY_DATABASE_USER}
        DATABASE_PASSWORD: ${GATEWAY_DATABASE_PASSWORD}
        DB_URL: ${GATEWAY_DB_URL}
        KAFKA_BOOTSTRAP_SERVERS: ${GATEWAY_KAFKA_BOOTSTRAP_SERVERS}
        KAFKA_ADVERTISED_HOST: ${GATEWAY_KAFKA_ADVERTISED_HOST}
        CLUSTER_ID: ${GATEWAY_CLUSTER_ID}
        KAFKA_PRODUCER_RETRIES: ${GATEWAY_KAFKA_PRODUCER_RETRIES}
        KAFKA_PRODUCER_ACKS: ${GATEWAY_KAFKA_PRODUCER_ACKS}
        KAFKA_PRODUCER_LINGER_MS: ${GATEWAY_KAFKA_PRODUCER_LINGER_MS}
        KEYCLOAK_ADMIN: ${GATEWAY_KEYCLOAK_ADMIN}
        KEYCLOAK_ADMIN_PASSWORD: ${GATEWAY_KEYCLOAK_ADMIN_PASSWORD}
        KC_HEALTH_ENABLED: ${GATEWAY_KC_HEALTH_ENABLED}
        OAUTH2_ISSUER_URI: ${GATEWAY_OAUTH2_ISSUER_URI}
        CORS_ALLOWED_ORIGINS: ${GATEWAY_CORS_ALLOWED_ORIGINS}
        GF_SECURITY_ADMIN_USER: ${GATEWAY_GF_SECURITY_ADMIN_USER}
        GF_SECURITY_ADMIN_PASSWORD: ${GATEWAY_GF_SECURITY_ADMIN_PASSWORD}
        SERVICE_URL: ${GATEWAY_SERVICE_URL}
        KEYCLOAK_URL: ${GATEWAY_KEYCLOAK_URL}
        PROMETHEUS_URL: ${GATEWAY_PROMETHEUS_URL}
        GRAFANA_URL: ${GATEWAY_GRAFANA_URL}
        DIRECTORY_URL: ${GATEWAY_DIRECTORY_URL}
        SCHEDULING_URL: ${GATEWAY_SCHEDULING_URL}
        ADMISSIONS_URL: ${GATEWAY_ADMISSIONS_URL}
        CONSENTS_URL: ${GATEWAY_CONSENTS_URL}
        DOCS_URL: ${GATEWAY_DOCS_URL}
        NOTIFICATIONS_URL: ${GATEWAY_NOTIFICATIONS_URL}
        AUDIT_URL: ${GATEWAY_AUDIT_URL}
        TELEVISIT_URL: ${GATEWAY_TELEVISIT_URL}
        PAYMENTS_URL: ${GATEWAY_PAYMENTS_URL}
        PRESCRIBING_URL: ${GATEWAY_PRESCRIBING_URL}
        OPENAPI_DIRECTORY_URL: ${GATEWAY_OPENAPI_DIRECTORY_URL}
        OPENAPI_SCHEDULING_URL: ${GATEWAY_OPENAPI_SCHEDULING_URL}
        OPENAPI_ADMISSIONS_URL: ${GATEWAY_OPENAPI_ADMISSIONS_URL}
        OPENAPI_CONSENTS_URL: ${GATEWAY_OPENAPI_CONSENTS_URL}
        OPENAPI_DOCS_URL: ${GATEWAY_OPENAPI_DOCS_URL}
        OPENAPI_NOTIFICATIONS_URL: ${GATEWAY_OPENAPI_NOTIFICATIONS_URL}
        OPENAPI_AUDIT_URL: ${GATEWAY_OPENAPI_AUDIT_URL}
        OPENAPI_TELEVISIT_URL: ${GATEWAY_OPENAPI_TELEVISIT_URL}
        OPENAPI_PAYMENTS_URL: ${GATEWAY_OPENAPI_PAYMENTS_URL}
        OPENAPI_PRESCRIBING_URL: ${GATEWAY_OPENAPI_PRESCRIBING_URL}
        TESTCONTAINERS_DOCKER_HOST: ${GATEWAY_TESTCONTAINERS_DOCKER_HOST}
      ports:
        - "8080:8080"
      healthcheck:
        test: ["CMD-SHELL", "sh -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
        interval: 10s
        timeout: 5s
        retries: 30
        start_period: 25s
      restart: unless-stopped

    # =========================
    # Prometheus
    # =========================
    prometheus:
      build:
        context: ./prometheus
      image: sanitech/prometheus-gateway:${GATEWAY_SPRING_PROFILES_ACTIVE}
      command:
        - "--config.file=/etc/prometheus/prometheus.yml"
      ports:
        - "9090:9090"
      volumes:
        - sanitech_gateway_prometheus:/prometheus
      healthcheck:
        test: ["CMD-SHELL", "sh -c 'exec 3<>/dev/tcp/127.0.0.1/9090'"]
        interval: 10s
        timeout: 5s
        retries: 30
        start_period: 15s
      restart: unless-stopped

    # =========================
    # Grafana
    # =========================
    grafana:
      build:
        context: ./grafana
      image: sanitech/grafana-gateway:${GATEWAY_SPRING_PROFILES_ACTIVE}
      depends_on:
        - prometheus
      environment:
        GF_SECURITY_ADMIN_USER: ${GATEWAY_GF_SECURITY_ADMIN_USER}
        GF_SECURITY_ADMIN_PASSWORD: ${GATEWAY_GF_SECURITY_ADMIN_PASSWORD}
      ports:
        - "3000:3000"
      volumes:
        - sanitech_gateway_grafana:/var/lib/grafana
      healthcheck:
        test: ["CMD-SHELL", "sh -c 'exec 3<>/dev/tcp/127.0.0.1/3000'"]
        interval: 10s
        timeout: 5s
        retries: 30
        start_period: 20s
      restart: unless-stopped

  volumes:
    sanitech_gateway_pgdata:
    sanitech_gateway_prometheus:
    sanitech_gateway_grafana:
