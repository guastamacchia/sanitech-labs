  services:

    # =========================
    # PostgreSQL
    # =========================
    postgres:
      image: postgres:16
      environment:
        POSTGRES_DB: ${SCHEDULING_DATABASE_NAME}
        POSTGRES_USER: ${SCHEDULING_DATABASE_USER}
        POSTGRES_PASSWORD: ${SCHEDULING_DATABASE_PASSWORD}
      volumes:
        - sanitech_scheduling_pgdata:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${SCHEDULING_DATABASE_USER} -d ${SCHEDULING_DATABASE_NAME}"]
        interval: 5s
        timeout: 5s
        retries: 10
      restart: unless-stopped

    # =========================
    # Kafka (KRaft)
    # =========================
    kafka:
      image: confluentinc/cp-kafka:7.7.1
      ports:
        - "29092:29092"
      environment:
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: broker,controller
        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
        KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://${SCHEDULING_KAFKA_ADVERTISED_HOST}:29092
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
        KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
        CLUSTER_ID: ${SCHEDULING_CLUSTER_ID}
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
        KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      healthcheck:
        test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:9092 >/dev/null 2>&1 || exit 1"]
        interval: 10s
        timeout: 10s
        retries: 30
        start_period: 60s
      restart: unless-stopped

    # =========================
    # Keycloak
    # =========================
    keycloak:
      build:
        context: ./keycloak
      image: sanitech/keycloak-scheduling:${SCHEDULING_SPRING_PROFILES_ACTIVE}
      environment:
        KEYCLOAK_ADMIN: ${SCHEDULING_KEYCLOAK_ADMIN}
        KEYCLOAK_ADMIN_PASSWORD: ${SCHEDULING_KEYCLOAK_ADMIN_PASSWORD}
        KC_HEALTH_ENABLED: ${SCHEDULING_KC_HEALTH_ENABLED}
      ports:
        - "8081:8080"
      healthcheck:
        test: ["CMD-SHELL", "sh -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
        interval: 10s
        timeout: 5s
        retries: 30
        start_period: 40s
      restart: unless-stopped

    # =====================================================
    # svc-scheduling
    # =====================================================
    svc-scheduling:
      build:
        context: ..
        dockerfile: infra/Dockerfile
        args:
          JAR_FILE: target/*.jar
      image: sanitech/${SVC_NAME:-svc-scheduling}:${SCHEDULING_SPRING_PROFILES_ACTIVE}
      depends_on:
        postgres:
          condition: service_healthy
        kafka:
          condition: service_healthy
        keycloak:
          condition: service_healthy
      environment:
        SPRING_PROFILES_ACTIVE: ${SCHEDULING_SPRING_PROFILES_ACTIVE}
        DATABASE_NAME: ${SCHEDULING_DATABASE_NAME}
        DATABASE_USER: ${SCHEDULING_DATABASE_USER}
        DATABASE_PASSWORD: ${SCHEDULING_DATABASE_PASSWORD}
        DB_URL: ${SCHEDULING_DB_URL}
        KAFKA_BOOTSTRAP_SERVERS: ${SCHEDULING_KAFKA_BOOTSTRAP_SERVERS}
        KAFKA_ADVERTISED_HOST: ${SCHEDULING_KAFKA_ADVERTISED_HOST}
        CLUSTER_ID: ${SCHEDULING_CLUSTER_ID}
        KAFKA_PRODUCER_RETRIES: ${SCHEDULING_KAFKA_PRODUCER_RETRIES}
        KAFKA_PRODUCER_ACKS: ${SCHEDULING_KAFKA_PRODUCER_ACKS}
        KAFKA_PRODUCER_LINGER_MS: ${SCHEDULING_KAFKA_PRODUCER_LINGER_MS}
        KEYCLOAK_ADMIN: ${SCHEDULING_KEYCLOAK_ADMIN}
        KEYCLOAK_ADMIN_PASSWORD: ${SCHEDULING_KEYCLOAK_ADMIN_PASSWORD}
        KC_HEALTH_ENABLED: ${SCHEDULING_KC_HEALTH_ENABLED}
        OAUTH2_ISSUER_URI: ${SCHEDULING_OAUTH2_ISSUER_URI}
        CORS_ALLOWED_ORIGINS: ${SCHEDULING_CORS_ALLOWED_ORIGINS}
        GF_SECURITY_ADMIN_USER: ${SCHEDULING_GF_SECURITY_ADMIN_USER}
        GF_SECURITY_ADMIN_PASSWORD: ${SCHEDULING_GF_SECURITY_ADMIN_PASSWORD}
        SERVICE_URL: ${SCHEDULING_SERVICE_URL}
        KEYCLOAK_URL: ${SCHEDULING_KEYCLOAK_URL}
        PROMETHEUS_URL: ${SCHEDULING_PROMETHEUS_URL}
        GRAFANA_URL: ${SCHEDULING_GRAFANA_URL}
        TESTCONTAINERS_DOCKER_HOST: ${SCHEDULING_TESTCONTAINERS_DOCKER_HOST}
      ports:
        - "8083:8083"
      healthcheck:
        test: ["CMD-SHELL", "sh -c 'exec 3<>/dev/tcp/127.0.0.1/8083'"]
        interval: 10s
        timeout: 5s
        retries: 30
        start_period: 25s
      restart: unless-stopped

    # =========================
    # Prometheus
    # =========================
    prometheus:
      build:
        context: ./prometheus
      image: sanitech/prometheus-scheduling:${SCHEDULING_SPRING_PROFILES_ACTIVE}
      command:
        - "--config.file=/etc/prometheus/prometheus.yml"
      ports:
        - "9090:9090"
      volumes:
        - sanitech_scheduling_prometheus:/prometheus
      healthcheck:
        test: ["CMD-SHELL", "sh -c 'exec 3<>/dev/tcp/127.0.0.1/9090'"]
        interval: 10s
        timeout: 5s
        retries: 30
        start_period: 15s
      restart: unless-stopped

    # =========================
    # Grafana
    # =========================
    grafana:
      build:
        context: ./grafana
      image: sanitech/grafana-scheduling:${SCHEDULING_SPRING_PROFILES_ACTIVE}
      depends_on:
        - prometheus
      environment:
        GF_SECURITY_ADMIN_USER: ${SCHEDULING_GF_SECURITY_ADMIN_USER}
        GF_SECURITY_ADMIN_PASSWORD: ${SCHEDULING_GF_SECURITY_ADMIN_PASSWORD}
      ports:
        - "3000:3000"
      volumes:
        - sanitech_scheduling_grafana:/var/lib/grafana
      healthcheck:
        test: ["CMD-SHELL", "sh -c 'exec 3<>/dev/tcp/127.0.0.1/3000'"]
        interval: 10s
        timeout: 5s
        retries: 30
        start_period: 20s
      restart: unless-stopped

  volumes:
    sanitech_scheduling_pgdata:
    sanitech_scheduling_prometheus:
    sanitech_scheduling_grafana:
