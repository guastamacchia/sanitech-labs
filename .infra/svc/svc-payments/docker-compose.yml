services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${PAYMENTS_DATABASE_NAME}
      POSTGRES_USER: ${PAYMENTS_DATABASE_USER}
      POSTGRES_PASSWORD: ${PAYMENTS_DATABASE_PASSWORD}
    volumes:
      - sanitech_payments_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENTS_DATABASE_USER} -d ${PAYMENTS_DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://${PAYMENTS_KAFKA_ADVERTISED_HOST}:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      CLUSTER_ID: ${PAYMENTS_CLUSTER_ID}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  keycloak:
    build:
      context: ./keycloak
    image: sanitech/keycloak-payments:${PAYMENTS_SPRING_PROFILES_ACTIVE}
    environment:
      KEYCLOAK_ADMIN: ${PAYMENTS_KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${PAYMENTS_KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: ${PAYMENTS_KC_HEALTH_ENABLED}
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
    restart: unless-stopped

  svc-payments:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      args:
        JAR_FILE: target/*.jar
    image: sanitech/${SVC_NAME:-svc-payments}:${PAYMENTS_SPRING_PROFILES_ACTIVE}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${PAYMENTS_SPRING_PROFILES_ACTIVE}
      DATABASE_NAME: ${PAYMENTS_DATABASE_NAME}
      DATABASE_USER: ${PAYMENTS_DATABASE_USER}
      DATABASE_PASSWORD: ${PAYMENTS_DATABASE_PASSWORD}
      DB_URL: ${PAYMENTS_DB_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${PAYMENTS_KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_ADVERTISED_HOST: ${PAYMENTS_KAFKA_ADVERTISED_HOST}
      CLUSTER_ID: ${PAYMENTS_CLUSTER_ID}
      KAFKA_PRODUCER_RETRIES: ${PAYMENTS_KAFKA_PRODUCER_RETRIES}
      KAFKA_PRODUCER_ACKS: ${PAYMENTS_KAFKA_PRODUCER_ACKS}
      KAFKA_PRODUCER_LINGER_MS: ${PAYMENTS_KAFKA_PRODUCER_LINGER_MS}
      KEYCLOAK_ADMIN: ${PAYMENTS_KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${PAYMENTS_KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: ${PAYMENTS_KC_HEALTH_ENABLED}
      OAUTH2_ISSUER_URI: ${PAYMENTS_OAUTH2_ISSUER_URI}
      SANITECH_PAYMENTS_WEBHOOK_SECRET: ${PAYMENTS_SANITECH_PAYMENTS_WEBHOOK_SECRET}
      CORS_ALLOWED_ORIGINS: ${PAYMENTS_CORS_ALLOWED_ORIGINS}
      GF_SECURITY_ADMIN_USER: ${PAYMENTS_GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${PAYMENTS_GF_SECURITY_ADMIN_PASSWORD}
      SERVICE_URL: ${PAYMENTS_SERVICE_URL}
      KEYCLOAK_URL: ${PAYMENTS_KEYCLOAK_URL}
      PROMETHEUS_URL: ${PAYMENTS_PROMETHEUS_URL}
      GRAFANA_URL: ${PAYMENTS_GRAFANA_URL}
      TESTCONTAINERS_DOCKER_HOST: ${PAYMENTS_TESTCONTAINERS_DOCKER_HOST}
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'exec 3<>/dev/tcp/127.0.0.1/8090'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 25s
    restart: unless-stopped

  prometheus:
    build:
      context: ./prometheus
    image: sanitech/prometheus-payments:${PAYMENTS_SPRING_PROFILES_ACTIVE}
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - sanitech_payments_prometheus:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'exec 3<>/dev/tcp/127.0.0.1/9090'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 15s
    restart: unless-stopped

  grafana:
    build:
      context: ./grafana
    image: sanitech/grafana-payments:${PAYMENTS_SPRING_PROFILES_ACTIVE}
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${PAYMENTS_GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${PAYMENTS_GF_SECURITY_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - sanitech_payments_grafana:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'exec 3<>/dev/tcp/127.0.0.1/3000'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

volumes:
  sanitech_payments_pgdata:
  sanitech_payments_prometheus:
  sanitech_payments_grafana:
