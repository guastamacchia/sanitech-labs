version: "3.9"
name: svc-directory
services:

  # =========================
  # PostgreSQL
  # =========================
  # Database relazionale usato dal microservizio.
  postgres:
    build:
      context: ./postgres
    image: sanitech/postgres-directory:${DIRECTORY_SPRING_PROFILES_ACTIVE}
    environment:
      # Mapping tecnico richiesto dall'immagine Postgres.
      POSTGRES_DB: ${DIRECTORY_DATABASE_NAME}
      POSTGRES_USER: ${DIRECTORY_DATABASE_USER}
      POSTGRES_PASSWORD: ${DIRECTORY_DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      # Persistenza dei dati tra restart dei container
      - sanitech_pgdata:/var/lib/postgresql/data
    healthcheck:
      # Verifica che il database sia pronto ad accettare connessioni
      test: ["CMD-SHELL", "pg_isready -U ${DIRECTORY_DATABASE_USER} -d ${DIRECTORY_DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # =========================
  # Kafka (KRaft)
  # =========================
  # Message broker usato per comunicazioni asincrone/event-driven.
  # Configurato in modalità KRaft (senza Zookeeper).
  #
  # Listener:
  # - INTERNAL: per i container Docker (kafka:9092)
  # - EXTERNAL: per accesso dall'host (${DIRECTORY_KAFKA_ADVERTISED_HOST}:29092)
  kafka:
    build:
      context: ./kafka
    image: sanitech/kafka-directory:${DIRECTORY_SPRING_PROFILES_ACTIVE}
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      # =========================
      # KRaft core
      # =========================
      # Single node: broker + controller nello stesso processo.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # =========================
      # Controller listener (KRaft)
      # =========================
      # Porta dedicata al ruolo di controller in modalità KRaft.
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Listener per il controller.
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # =========================
      # Listeners (INTERNAL/EXTERNAL/CONTROLLER)
      # =========================
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://${DIRECTORY_KAFKA_ADVERTISED_HOST}:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # =========================
      # KRaft storage
      # =========================
      CLUSTER_ID: ${DIRECTORY_CLUSTER_ID}
      # =========================
      # Single-node settings
      # =========================
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    volumes:
      # Persistenza dei log e dei dati di Kafka (KRaft)
      - sanitech_kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  # =========================
  # Keycloak
  # =========================
  # Identity Provider (OIDC) usato dal microservizio.
  keycloak:
    build:
      context: ./keycloak
    image: sanitech/keycloak-directory:${DIRECTORY_SPRING_PROFILES_ACTIVE}
    environment:
      # =========================
      # Bootstrap admin user
      # =========================
      KEYCLOAK_ADMIN: ${DIRECTORY_KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${DIRECTORY_KEYCLOAK_ADMIN_PASSWORD}
      # =========================
      # Health endpoint
      # =========================
      KC_HEALTH_ENABLED: ${DIRECTORY_KC_HEALTH_ENABLED}
    ports:
      # Espone la console di amministrazione
      - "8081:8080"
    healthcheck:
      # Verifica che Keycloak sia in ascolto sulla porta HTTP
      test: ["CMD-SHELL", "sh -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
    restart: unless-stopped

  # Microservizio Java (Spring Boot). Il JAR viene compilato esternamente e poi inserito nell'immagine Docker.
  svc-directory:
    build:
      # Il contesto è la root del progetto.
      context: ..
      # Dockerfile dell'applicazione.
      dockerfile: infra/Dockerfile
      args:
        JAR_FILE: target/*.jar
    image: sanitech/svc-directory:${DIRECTORY_SPRING_PROFILES_ACTIVE}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${DIRECTORY_SPRING_PROFILES_ACTIVE}
      DATABASE_HOST: ${DIRECTORY_DATABASE_HOST}
      DATABASE_PORT: ${DIRECTORY_DATABASE_PORT}
      DATABASE_NAME: ${DIRECTORY_DATABASE_NAME}
      DATABASE_USER: ${DIRECTORY_DATABASE_USER}
      DATABASE_PASSWORD: ${DIRECTORY_DATABASE_PASSWORD}
      KAFKA_HOST: ${DIRECTORY_KAFKA_HOST}
      KAFKA_ADVERTISED_HOST: ${DIRECTORY_KAFKA_ADVERTISED_HOST}
      KAFKA_PORT: ${DIRECTORY_KAFKA_PORT}
      CLUSTER_ID: ${DIRECTORY_CLUSTER_ID}
      KAFKA_PRODUCER_ACKS: ${DIRECTORY_KAFKA_PRODUCER_ACKS}
      KAFKA_PRODUCER_RETRIES: ${DIRECTORY_KAFKA_PRODUCER_RETRIES}
      KAFKA_PRODUCER_LINGER_MS: ${DIRECTORY_KAFKA_PRODUCER_LINGER_MS}
      KEYCLOAK_ADMIN: ${DIRECTORY_KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${DIRECTORY_KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: ${DIRECTORY_KC_HEALTH_ENABLED}
      OAUTH2_SCHEME: ${DIRECTORY_OAUTH2_SCHEME}
      OAUTH2_HOST: ${DIRECTORY_OAUTH2_HOST}
      OAUTH2_PORT: ${DIRECTORY_OAUTH2_PORT}
      OAUTH2_REALM: ${DIRECTORY_OAUTH2_REALM}
      CORS_ALLOWED_ORIGINS: ${DIRECTORY_CORS_ALLOWED_ORIGINS}
      GF_SECURITY_ADMIN_USER: ${DIRECTORY_GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${DIRECTORY_GF_SECURITY_ADMIN_PASSWORD}
      SERVICE_URL: ${DIRECTORY_SERVICE_URL}
      KEYCLOAK_URL: ${DIRECTORY_KEYCLOAK_URL}
      PROMETHEUS_URL: ${DIRECTORY_PROMETHEUS_URL}
      GRAFANA_URL: ${DIRECTORY_GRAFANA_URL}
      RESILIENCE4J_RATELIMITER_INSTANCES_DIRECTORYAPI_LIMITFORPERIOD: ${DIRECTORY_RESILIENCE4J_RATELIMITER_INSTANCES_DIRECTORYAPI_LIMITFORPERIOD}
      RESILIENCE4J_RATELIMITER_INSTANCES_DIRECTORYAPI_LIMITREFRESHPERIOD: ${DIRECTORY_RESILIENCE4J_RATELIMITER_INSTANCES_DIRECTORYAPI_LIMITREFRESHPERIOD}
      RESILIENCE4J_RATELIMITER_INSTANCES_DIRECTORYAPI_TIMEOUTDURATION: ${DIRECTORY_RESILIENCE4J_RATELIMITER_INSTANCES_DIRECTORYAPI_TIMEOUTDURATION}
      RESILIENCE4J_BULKHEAD_INSTANCES_DIRECTORYREAD_MAXCONCURRENTCALLS: ${DIRECTORY_RESILIENCE4J_BULKHEAD_INSTANCES_DIRECTORYREAD_MAXCONCURRENTCALLS}
      RESILIENCE4J_BULKHEAD_INSTANCES_DIRECTORYREAD_MAXWAITDURATION: ${DIRECTORY_RESILIENCE4J_BULKHEAD_INSTANCES_DIRECTORYREAD_MAXWAITDURATION}
    ports:
      # Espone API REST sull'host.
      - "${PORT:-8082}:8082"
    healthcheck:
      # Verifica che il microservizio sia in ascolto sulla porta applicativa
      test: ["CMD-SHELL", "sh -c 'exec 3<>/dev/tcp/127.0.0.1/8082'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 25s
    restart: unless-stopped

  # =========================
  # Prometheus
  # =========================
  # Raccolta delle metriche esposte dai servizi (Spring Actuator /prometheus).
  prometheus:
    build:
      context: ./prometheus
    image: sanitech/prometheus-directory:${DIRECTORY_SPRING_PROFILES_ACTIVE}
    command:
      # File di configurazione statico di Prometheus.
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      # Espone l'interfaccia web di Prometheus sull'host.
      - "9090:9090"
    volumes:
      # Persistenza delle serie temporali.
      - sanitech_prometheus:/prometheus
    healthcheck:
      # Verifica che Prometheus sia in ascolto sulla porta HTTP.
      test: ["CMD-SHELL", "sh -c 'exec 3<>/dev/tcp/127.0.0.1/9090'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 15s
    restart: unless-stopped

  # =========================
  # Grafana
  # =========================
  # Visualizzazione delle metriche raccolte da Prometheus.
  grafana:
    build:
      context: ./grafana
    image: sanitech/grafana-directory:${DIRECTORY_SPRING_PROFILES_ACTIVE}
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${DIRECTORY_GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${DIRECTORY_GF_SECURITY_ADMIN_PASSWORD}
    ports:
      # Espone l'interfaccia web sull'host.
      - "3000:3000"
    volumes:
      # Persistenza dati (dashboard, utenti, datasource).
      - sanitech_grafana:/var/lib/grafana
    healthcheck:
      # Verifica che Grafana sia in ascolto sulla porta HTTP.
      test: ["CMD-SHELL", "sh -c 'exec 3<>/dev/tcp/127.0.0.1/3000'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

# =====================================================
# Volumi persistenti
# =====================================================
volumes:
  sanitech_pgdata:
  sanitech_kafka_data:
  sanitech_prometheus:
  sanitech_grafana:
