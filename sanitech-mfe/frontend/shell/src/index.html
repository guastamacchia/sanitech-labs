<!doctype html><html lang='it'><head><meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Clinica Guastamacchia — Shell</title>
<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'></head>
<body class='bg-light'><div class='container py-4'>
<nav class="navbar navbar-expand-lg bg-white border-bottom mb-3">
  <a class="navbar-brand fw-bold" href="#">Clinica Guastamacchia</a>
  <div class="ms-auto d-flex gap-2">
    <a href="http://localhost:4301" class="btn btn-outline-primary">Paziente</a>
    <a href="http://localhost:4302" class="btn btn-outline-secondary">Medico</a>
    <a href="http://localhost:4303" class="btn btn-outline-secondary">Admin</a>
  </div>
</nav>
<div class="card p-3"><h1 class="h5">Benvenuto</h1>
<p>Shell con login dev (Direct Access Grant) per ottenere un token JWT.</p>
<p><a class="btn btn-link" href="http://localhost:8080/swagger.html">Swagger API</a></p></div>
<div class="card mt-3 p-3">
  <h2 class="h6">Login (solo dev)</h2>
  <div class="row g-2">
    <div class="col-md-3"><input id="u" class="form-control" placeholder="username" value="anna"></div>
    <div class="col-md-3"><input id="p" class="form-control" placeholder="password" value="password" type="password"></div>
    <div class="col-md-2 d-grid"><button class="btn btn-primary" onclick="login(u.value,p.value)">Entra</button></div>
    <div class="col-md-3"><span data-auth>🔒 Non autenticato</span></div>
  </div>
</div>

<script>
const KC = { base: 'http://localhost:8081/realms/guastamacchia/protocol/openid-connect', client_id: 'guastamacchia-frontend' };
async function login(u,p){
  const body = new URLSearchParams({grant_type:'password', client_id:KC.client_id, username:u, password:p});
  const res = await fetch(KC.base + '/token', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body });
  if(!res.ok){ alert('Login fallito'); return; }
  const data = await res.json();
  localStorage.setItem('token', data.access_token);
  document.querySelectorAll('[data-auth]').forEach(e=>e.innerHTML='✅ Autenticato');
}
function bearer(){ return localStorage.getItem('token') || ''; }
</script>
</div></body></html>
