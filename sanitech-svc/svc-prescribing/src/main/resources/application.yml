server:
  port: ${PORT:8091}

spring:
  application:
    name: svc-prescribing

  # Datasource Postgres (runtime). In locale, usa infra/docker-compose.yml (porta 5443).
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5443/sanitech_prescribing}
    username: ${DB_USER:sanitech}
    password: ${DB_PASSWORD:sanitech}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none # Schema gestito da Flyway (db/migration)
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  security:
    oauth2:
      resourceserver:
        jwt:
          # Issuer URI di Keycloak (realm Sanitech). In produzione via environment.
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8081/realms/sanitech}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

# Config CORS: per default non abilitiamo origini, così il servizio è "closed by default".
sanitech:
  cors:
    enabled: true
    path-patterns:
      - /api/**
    allowed-origins:
      - ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
    allowed-methods:
      - "GET"
      - "POST"
      - "PUT"
      - "PATCH"
      - "DELETE"
      - "OPTIONS"
    allowed-headers:
      - "*"
    exposed-headers:
      - "Location"
    allow-credentials: false
    max-age: 3600

  security:
    enabled: true
    public-endpoints:
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /actuator/health/**
      - /actuator/info
      - /actuator/metrics/**
      - /actuator/prometheus

  openapi:
    enabled: true
    group: prescribing
    packages-to-scan:
      - it.sanitech.prescribing.web
    title: Sanitech — Prescribing API
    version: v1

  integrations:
    consents:
      # Base URL di svc-consents (in locale può essere esposto da un altro compose/root).
      base-url: ${CONSENTS_BASE_URL:http://localhost:8085}

  outbox:
    topic: ${OUTBOX_TOPIC:prescribing.events}
    publisher:
      # Frequenza (ms) del job che pubblica gli eventi Outbox verso Kafka.
      enabled: ${OUTBOX_PUBLISHER_ENABLED:false}
      fixed-delay-ms: ${OUTBOX_PUBLISHER_DELAY_MS:1000}

resilience4j:
  ratelimiter:
    instances:
      prescribingApi:
        limitForPeriod: 60
        limitRefreshPeriod: 1s
        timeoutDuration: 0

  bulkhead:
    instances:
      prescribingRead:
        maxConcurrentCalls: 30
        maxWaitDuration: 0

  retry:
    instances:
      outboxPublish:
        maxAttempts: 5
        waitDuration: 250ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.lang.Exception

      consents:
        maxAttempts: 3
        waitDuration: 200ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2

  circuitbreaker:
    instances:
      consents:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s

logging:
  level:
    root: INFO
    it.sanitech.prescribing: INFO
