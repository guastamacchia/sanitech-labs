apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "svc-prescribing.fullname" . }}-config
data:
  DB_URL: {{ .Values.env.DB_URL | quote }}
  DB_USER: {{ .Values.env.DB_USER | quote }}
  OAUTH2_ISSUER_URI: {{ .Values.env.OAUTH2_ISSUER_URI | quote }}
  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.env.KAFKA_BOOTSTRAP_SERVERS | quote }}
  CONSENTS_BASE_URL: {{ .Values.env.CONSENTS_BASE_URL | quote }}
