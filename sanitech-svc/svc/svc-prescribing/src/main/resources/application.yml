server:
  port: ${PORT:8092}

spring:
  application:
    name: svc-prescribing

  # Datasource Postgres (runtime). In locale, usa docker-compose.dev.yml (porta 5443).
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5443/sanitech_prescribing}
    username: ${DB_USER:sanitech}
    password: ${DB_PASSWORD:sanitech}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none # Schema gestito da Flyway (db/migration)
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  security:
    oauth2:
      resourceserver:
        jwt:
          # Issuer URI di Keycloak (realm Sanitech). In produzione via environment.
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8081/realms/sanitech}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

# Config CORS: per default non abilitiamo origini, così il servizio è "closed by default".
sanitech:
  cors:
    path-patterns:
      - /api/**
    allowed-origins: []
    allow-credentials: false

  integrations:
    consents:
      # Base URL di svc-consents (in locale può essere esposto da un altro compose/root).
      base-url: ${CONSENTS_BASE_URL:http://localhost:8084}

  outbox:
    publisher:
      # Frequenza (ms) del job che pubblica gli eventi Outbox verso Kafka.
      delay-ms: ${OUTBOX_PUBLISH_DELAY_MS:1000}

resilience4j:
  ratelimiter:
    instances:
      prescribingApi:
        limitForPeriod: 60
        limitRefreshPeriod: 1s
        timeoutDuration: 0

  bulkhead:
    instances:
      prescribingRead:
        maxConcurrentCalls: 30
        maxWaitDuration: 0

  retry:
    instances:
      outboxPublish:
        maxAttempts: 5
        waitDuration: 250ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.lang.Exception

      consents:
        maxAttempts: 3
        waitDuration: 200ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2

  circuitbreaker:
    instances:
      consents:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s

logging:
  level:
    root: INFO
    it.sanitech.prescribing: INFO
