services:
  postgres:
    image: postgres:16-alpine
    container_name: sanitech-prescribing-postgres
    environment:
      POSTGRES_DB: sanitech_prescribing
      POSTGRES_USER: sanitech
      POSTGRES_PASSWORD: sanitech
    ports:
      - "5443:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanitech -d sanitech_prescribing"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: bitnami/kafka:3.7
    container_name: sanitech-kafka
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30

  svc-prescribing:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/sanitech_prescribing
      DB_USER: sanitech
      DB_PASSWORD: sanitech
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OAUTH2_ISSUER_URI: http://host.docker.internal:8081/realms/sanitech
      CONSENTS_BASE_URL: http://host.docker.internal:8085
      PORT: 8091
    ports:
      - "8091:8091"
