apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "svc-notifications.fullname" . }}
  labels:
    {{- include "svc-notifications.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "svc-notifications.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "svc-notifications.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: svc-notifications
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "svc-notifications.fullname" . }}-config
            - secretRef:
                name: {{ include "svc-notifications.fullname" . }}-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
