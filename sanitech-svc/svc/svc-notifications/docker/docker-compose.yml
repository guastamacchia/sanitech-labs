version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sanitech_notifications
      POSTGRES_USER: sanitech
      POSTGRES_PASSWORD: sanitech
    ports:
      - "5436:5432"

  redpanda:
    image: redpandadata/redpanda:v24.2.5
    command: >
      redpanda start --overprovisioned --smp 1 --memory 512M --reserve-memory 0M
      --node-id 0 --check=false
      --kafka-addr PLAINTEXT://0.0.0.0:9092
      --advertise-kafka-addr PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      # SMTP
      - "1025:1025"
      # Web UI
      - "8025:8025"

  svc-notifications:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      postgres:
        condition: service_started
      redpanda:
        condition: service_started
      mailhog:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/sanitech_notifications
      DB_USER: sanitech
      DB_PASSWORD: sanitech
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      OAUTH2_ISSUER_URI: http://host.docker.internal:8081/realms/sanitech
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_FROM: no-reply@sanitech.local
    ports:
      - "8087:8087"
