server:
  port: 8083

spring:
  application:
    name: svc-scheduling

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/sanitech_scheduling}
    username: ${DB_USER:sanitech}
    password: ${DB_PASSWORD:sanitech}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          # URI dell'issuer OIDC di Keycloak.
          # Deve combaciare con il realm configurato.
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8081/realms/sanitech}

  kafka:
    # Bootstrap servers (in prod sostituire con cluster reale)
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      # Serializer base; in prod puoi usare JsonSerializer se preferisci
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        # Conferma di scrittura da tutti i replica leader
        acks: all
        # Retry lato producer Kafka (in aggiunta al retry applicativo Resilience4j)
        retries: 5
        # Backoff tra i retry lato Kafka (millisecondi)
        retry.backoff.ms: 200
        # Tempo massimo complessivo di consegna del messaggio
        delivery.timeout.ms: 120000

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      probes:
        enabled: true

# Log in sviluppo: utile per troubleshooting locale.
logging:
  level:
    it.sanitech.scheduling: DEBUG

# Resilience4j
resilience4j:
  retry:
    instances:
      outboxPublish:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2.0
        retryExceptions:
          - org.apache.kafka.common.errors.TimeoutException
          - org.apache.kafka.common.errors.NetworkException
          - org.springframework.kafka.KafkaException

  ratelimiter:
    instances:
      schedulingApi:
        limitForPeriod: 60
        limitRefreshPeriod: 1s
        timeoutDuration: 0

  bulkhead:
    instances:
      schedulingRead:
        maxConcurrentCalls: 50
        maxWaitDuration: 0

sanitech:
  cors:
    enabled: true
    # Elenco dei pattern di path su cui applicare il filtro CORS.
    path-patterns:
      - /api/**

    # Origini autorizzate (evitare wildcard se allow-credentials=true).
    allowed-origins:
      - ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

    # Metodi HTTP permessi dal browser nelle richieste CORS.
    allowed-methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]

    # Header ammessi nella richiesta CORS.
    allowed-headers: [Authorization, Content-Type, Accept, Origin, X-Requested-With, X-Request-Id]

    # Header della risposta che il client è autorizzato a leggere.
    exposed-headers: [Location, Content-Disposition, X-Request-Id, X-Total-Count]

    # Se true, consente al browser di inviare cookie/authorization cross-site.
    allow-credentials: false

    # Cache del preflight (seconds).
    max-age: 3600

  security:
    enabled: true
    public-endpoints:
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /actuator/health/**
      - /actuator/info
      - /actuator/metrics/**
      - /actuator/prometheus

  openapi:
    enabled: true
    group: scheduling
    packages-to-scan:
      - it.sanitech.scheduling.web
    title: Sanitech — Scheduling API
    version: v1

  outbox:
    topic: ${OUTBOX_TOPIC:scheduling.events}
    publisher:
      # Esegue periodicamente il flush degli eventi non pubblicati.
      delay-ms: 1000

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui
    operationsSorter: method
    tagsSorter: alpha
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
