services:
  svc-gateway:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: sanitech-svc-gateway
    env_file:
      - ${ENV_FILE}
    ports:
      - "8080:8080"
    environment:
      # Keycloak realm issuer (OIDC)
      OAUTH2_ISSUER_URI: ${OAUTH2_ISSUER_URI}

      # Downstream base URLs (configurabili via env)
      DIRECTORY_URL: ${DIRECTORY_URL}
      SCHEDULING_URL: ${SCHEDULING_URL}
      ADMISSIONS_URL: ${ADMISSIONS_URL}
      CONSENTS_URL: ${CONSENTS_URL}
      DOCS_URL: ${DOCS_URL}
      NOTIFICATIONS_URL: ${NOTIFICATIONS_URL}
      AUDIT_URL: ${AUDIT_URL}
      TELEVISIT_URL: ${TELEVISIT_URL}
      PAYMENTS_URL: ${PAYMENTS_URL}
      PRESCRIBING_URL: ${PRESCRIBING_URL}

      # OpenAPI targets (configurabili via env)
      OPENAPI_DIRECTORY_URL: ${OPENAPI_DIRECTORY_URL}
      OPENAPI_SCHEDULING_URL: ${OPENAPI_SCHEDULING_URL}
      OPENAPI_ADMISSIONS_URL: ${OPENAPI_ADMISSIONS_URL}
      OPENAPI_CONSENTS_URL: ${OPENAPI_CONSENTS_URL}
      OPENAPI_DOCS_URL: ${OPENAPI_DOCS_URL}
      OPENAPI_NOTIFICATIONS_URL: ${OPENAPI_NOTIFICATIONS_URL}
      OPENAPI_AUDIT_URL: ${OPENAPI_AUDIT_URL}
      OPENAPI_TELEVISIT_URL: ${OPENAPI_TELEVISIT_URL}
      OPENAPI_PAYMENTS_URL: ${OPENAPI_PAYMENTS_URL}
      OPENAPI_PRESCRIBING_URL: ${OPENAPI_PRESCRIBING_URL}
