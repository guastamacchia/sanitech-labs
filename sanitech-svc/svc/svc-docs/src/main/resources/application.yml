# =============================================================================
# svc-docs — Sanitech
# =============================================================================
#
# Microservizio per gestione documentale:
# - metadati su Postgres
# - binari su S3/MinIO
# - eventi affidabili via Outbox → Kafka
#

server:
  port: 8086

spring:
  application:
    name: svc-docs

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sanitech_docs}
    username: ${DB_USER:sanitech}
    password: ${DB_PASSWORD:sanitech}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Sicurezza: Resource Server JWT (Keycloak OIDC).
  security:
    oauth2:
      resourceserver:
        jwt:
          # URI dell’issuer OIDC di Keycloak (realm).
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8081/realms/sanitech}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        # Conferma di scrittura da tutti i replica leader
        acks: all
        # Retry lato producer Kafka (in aggiunta al retry applicativo Resilience4j)
        retries: 5
        # Backoff tra i retry lato Kafka (millisecondi)
        retry.backoff.ms: 200
        # Tempo massimo complessivo di consegna del messaggio
        delivery.timeout.ms: 120000

# =============================================================================
# Observability / Actuator
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      probes:
        enabled: true

# =============================================================================
# Logging (sviluppo)
# =============================================================================
logging:
  level:
    root: DEBUG

# =============================================================================
# Resilience4j
# =============================================================================
resilience4j:
  retry:
    instances:
      # Retry per pubblicazione eventi outbox su Kafka
      outboxPublish:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2.0
        retryExceptions:
          - org.apache.kafka.common.errors.TimeoutException
          - org.apache.kafka.common.errors.NetworkException
          - org.springframework.kafka.KafkaException

      # Retry per chiamate verso svc-consents (errori transitori)
      consents:
        maxAttempts: 2
        waitDuration: 300ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2.0

  circuitbreaker:
    instances:
      # Circuit breaker per proteggere l'integrazione con svc-consents.
      consents:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

  ratelimiter:
    instances:
      # Rate-limit applicato a GET /api/docs
      docsApi:
        limitForPeriod: 60
        limitRefreshPeriod: 1s
        timeoutDuration: 0

  bulkhead:
    instances:
      # Bulkhead (semaphore) su operazioni read-heavy per evitare saturazione thread.
      docsRead:
        maxConcurrentCalls: 50
        maxWaitDuration: 0

# =============================================================================
# Sanitech custom properties
# =============================================================================
sanitech:
  # CORS (configurazione per ambiente)
  cors:
    path-patterns:
      - /api/**
    allowed-origins:
      - ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
      - Accept
      - Origin
      - X-Requested-With
      - X-Request-Id
    exposed-headers:
      - Location
      - Content-Disposition
      - X-Request-Id
      - X-Total-Count
    # Se true, consente al browser di inviare cookie/authorization cross-site.
    # ATTENZIONE: non compatibile con origini wildcard.
    allow-credentials: false
    max-age: 3600

  outbox:
    publisher:
      # Delay tra un ciclo e l'altro di pubblicazione eventi.
      delay-ms: 1000

  # Integrazione verso svc-consents (verifica consenso medico→paziente)
  consents:
    base-url: ${CONSENTS_BASE_URL:http://localhost:8085}

  # Storage S3/MinIO per i binari dei documenti
  docs:
    s3:
      endpoint: ${S3_ENDPOINT:http://localhost:9000}
      region: ${S3_REGION:us-east-1}
      access-key: ${S3_ACCESS_KEY:minio}
      secret-key: ${S3_SECRET_KEY:minio123}
      bucket: ${S3_BUCKET:sanitech-docs}
      path-style-access: true
      auto-create-bucket: true

# =============================================================================
# OpenAPI / Swagger UI
# =============================================================================
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui
    operationsSorter: method
    tagsSorter: alpha
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
