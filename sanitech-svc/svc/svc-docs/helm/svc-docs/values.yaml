replicaCount: 2

image:
  repository: sanitech/svc-docs
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8086

resources: {}
#  requests:
#    cpu: 200m
#    memory: 512Mi
#  limits:
#    cpu: 1
#    memory: 1Gi

env:
  SPRING_PROFILES_ACTIVE: prod

  DB_URL: jdbc:postgresql://postgres:5432/sanitech_docs
  DB_USER: sanitech
  DB_PASSWORD: sanitech

  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  OAUTH2_ISSUER_URI: http://keycloak:8080/realms/sanitech

  CONSENTS_BASE_URL: http://svc-consents:8084

  S3_ENDPOINT: http://minio:9000
  S3_REGION: us-east-1
  S3_ACCESS_KEY: minio
  S3_SECRET_KEY: minio123
  S3_BUCKET: sanitech-docs

livenessProbe:
  path: /actuator/health/liveness
  initialDelaySeconds: 20
  periodSeconds: 10

readinessProbe:
  path: /actuator/health/readiness
  initialDelaySeconds: 20
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: false
