version: "3.9"

name: sanitech-docs

services:

  postgres-docs:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sanitech_docs
      POSTGRES_USER: sanitech
      POSTGRES_PASSWORD: sanitech
    ports:
      - "5436:5432"
    volumes:
      - pg_docs_data:/var/lib/postgresql/data

  zookeeper:
    image: bitnami/zookeeper:3.9
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "2182:2181"

  kafka:
    image: bitnami/kafka:3.7
    depends_on:
      - zookeeper
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9096:9092"

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9006:9000"
      - "9007:9001"
    volumes:
      - minio_docs_data:/data

  # Inizializza bucket "sanitech-docs" (solo locale)
  minio-mc:
    image: minio/mc:RELEASE.2024-10-02T09-55-05Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio123 &&
      mc mb --ignore-existing local/sanitech-docs &&
      mc anonymous set none local/sanitech-docs &&
      echo 'Bucket sanitech-docs pronto.';"

  svc-docs:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    depends_on:
      - postgres-docs
      - kafka
      - minio
    environment:
      SPRING_PROFILES_ACTIVE: default
      DB_URL: jdbc:postgresql://postgres-docs:5432/sanitech_docs
      DB_USER: sanitech
      DB_PASSWORD: sanitech
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OAUTH2_ISSUER_URI: http://host.docker.internal:8081/realms/sanitech
      CONSENTS_BASE_URL: http://host.docker.internal:8085
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_BUCKET: sanitech-docs
    ports:
      - "8086:8086"

volumes:
  pg_docs_data:
  minio_docs_data:
