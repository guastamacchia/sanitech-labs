server:
  # Porta HTTP del microservizio Admissions (ricoveri + posti letto)
  port: 8084

spring:
  application:
    # Nome logico dell'applicazione (utile per log/metriche)
    name: svc-admissions

  datasource:
    # URL JDBC PostgreSQL. In Docker/K8s tipicamente arriva via env (DB_URL).
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sanitech_admissions}
    username: ${DB_USER:sanitech}
    password: ${DB_PASSWORD:sanitech}

  jpa:
    hibernate:
      # Il modello viene validato contro lo schema Flyway (non generato a runtime).
      ddl-auto: validate
    properties:
      hibernate.format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          # Issuer OIDC di Keycloak. Deve combaciare con realm configurato.
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8081/realms/sanitech}

  kafka:
    # Bootstrap servers (in prod sostituire con cluster reale)
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      # Serializer base: inviamo payload JSON come stringa.
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        # Conferma di scrittura dai replica in-sync
        acks: all
        # Retry lato producer Kafka (oltre ai retry applicativi Resilience4j)
        retries: 5
        # Backoff tra i retry lato Kafka (ms)
        retry.backoff.ms: 200
        # Tempo massimo complessivo di consegna
        delivery.timeout.ms: 120000

management:
  endpoints:
    web:
      # Endpoints esposti: health/metrics/prometheus per osservabilità.
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      probes:
        # Abilita readiness/liveness probes (K8s)
        enabled: true

# Resilience4j
resilience4j:
  retry:
    instances:
      outboxPublish:
        # 1 + 2 retry = 3 tentativi complessivi per evento
        maxAttempts: 3
        # Attesa iniziale tra tentativi
        waitDuration: 500ms
        # Backoff esponenziale (500ms, 1000ms, 2000ms, ...)
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2.0
        # Eccezioni su cui applicare retry
        retryExceptions:
          - org.apache.kafka.common.errors.TimeoutException
          - org.apache.kafka.common.errors.NetworkException
          - org.springframework.kafka.KafkaException

  ratelimiter:
    instances:
      admissionsApi:
        # Limite di richieste per intervallo per singola istanza
        limitForPeriod: 60
        limitRefreshPeriod: 1s
        # Se non c'è permesso immediato, fail-fast (HTTP 429)
        timeoutDuration: 0

  bulkhead:
    instances:
      admissionsRead:
        # Protezione da saturazione thread su chiamate di lettura
        maxConcurrentCalls: 50
        maxWaitDuration: 0

sanitech:
  cors:
    # Pattern di path su cui applicare il filtro CORS.
    path-patterns:
      - /api/**
    # Origini autorizzate (no wildcard se allow-credentials=true).
    allowed-origins:
      - ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
    # Metodi HTTP permessi nelle richieste CORS.
    allowed-methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
    # Header ammessi nella richiesta CORS.
    allowed-headers: [Authorization, Content-Type, Accept, Origin, X-Requested-With, X-Request-Id]
    # Header che il client è autorizzato a leggere.
    exposed-headers: [Location, Content-Disposition, X-Request-Id, X-Total-Count]
    # Se true consente cookie/Authorization cross-site (richiede origini esplicite).
    allow-credentials: false
    # Cache del preflight (OPTIONS) in secondi.
    max-age: 3600

  outbox:
    publisher:
      # Flush periodico degli eventi non pubblicati.
      delay-ms: 1000

springdoc:
  api-docs:
    enabled: true
    # http://localhost:8084/v3/api-docs/admissions
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui
    operationsSorter: method
    tagsSorter: alpha
    use-root-path: false
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
