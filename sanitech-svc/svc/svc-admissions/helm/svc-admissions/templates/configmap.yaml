apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "svc-admissions.fullname" . }}-config
data:
  SPRING_PROFILES_ACTIVE: {{ .Values.env.springProfilesActive | quote }}
  DB_URL: {{ .Values.env.dbUrl | quote }}
  DB_USER: {{ .Values.env.dbUser | quote }}
  OAUTH2_ISSUER_URI: {{ .Values.env.oauth2IssuerUri | quote }}
  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.env.kafkaBootstrapServers | quote }}
