server:
  # Porta HTTP del microservizio
  port: 8085

spring:
  application:
    # Nome applicativo (utile per log/metriche)
    name: svc-consents

  datasource:
    # In locale: DB Postgres dedicato al servizio.
    # In produzione: sovrascrivere tramite variabile DB_URL.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sanitech_consents}
    username: ${DB_USER:sanitech}
    password: ${DB_PASSWORD:sanitech}

  jpa:
    hibernate:
      # Il DDL è gestito esclusivamente da Flyway: Hibernate deve solo validare.
      ddl-auto: validate
    properties:
      hibernate.format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          # URI dell’issuer OIDC (Keycloak).
          # Deve combaciare con realm configurato.
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8081/realms/sanitech}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      # Serializzazione: inviamo il payload JSON come stringa.
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        acks: all
        retries: 5
        retry.backoff.ms: 200
        delivery.timeout.ms: 120000

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      probes:
        enabled: true

# Resilience4j
resilience4j:
  retry:
    instances:
      outboxPublish:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2.0
        retryExceptions:
          - org.apache.kafka.common.errors.TimeoutException
          - org.apache.kafka.common.errors.NetworkException
          - org.springframework.kafka.KafkaException

  ratelimiter:
    instances:
      consentsApi:
        # Limite per singola istanza (adattare in prod con gateway o Redis).
        limitForPeriod: 60
        limitRefreshPeriod: 1s
        timeoutDuration: 0

  bulkhead:
    instances:
      consentsRead:
        maxConcurrentCalls: 50
        maxWaitDuration: 0

sanitech:
  cors:
    enabled: true
    # Pattern di path su cui applicare CORS (utile se la UI chiama direttamente il servizio).
    path-patterns:
      - /api/**

    # Origini autorizzate (in dev aggiungere localhost:4200 se necessario).
    allowed-origins:
      - ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS

    allowed-headers:
      - Authorization
      - Content-Type
      - Accept
      - Origin
      - X-Requested-With
      - X-Request-Id

    exposed-headers:
      - Location
      - X-Request-Id

    # Se true, il browser può inviare cookie/authorization in cross-site.
    # Nota: non compatibile con origini wildcard.
    allow-credentials: false

    # Cache del preflight (OPTIONS) in secondi.
    max-age: 3600

  security:
    enabled: true
    public-endpoints:
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /actuator/health/**
      - /actuator/info
      - /actuator/metrics/**
      - /actuator/prometheus

  openapi:
    enabled: true
    group: consents
    packages-to-scan:
      - it.sanitech.consents.web
    title: Sanitech — Consents API
    version: v1

  outbox:
    topic: ${OUTBOX_TOPIC:consents.events}
    publisher:
      # Delay tra un ciclo e l'altro di pubblicazione eventi outbox.
      enabled: ${OUTBOX_PUBLISHER_ENABLED:false}
      fixed-delay-ms: ${OUTBOX_PUBLISHER_DELAY_MS:1000}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui
    operationsSorter: method
    tagsSorter: alpha
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
