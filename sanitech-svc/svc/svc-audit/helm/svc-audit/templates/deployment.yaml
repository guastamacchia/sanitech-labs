apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "svc-audit.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "svc-audit.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "svc-audit.fullname" . }}
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: svc-audit
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "svc-audit.fullname" . }}-config
            - secretRef:
                name: {{ include "svc-audit.fullname" . }}-secret
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readinessPath }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.livenessPath }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
{{ toYaml .Values.resources | indent 12 }}
