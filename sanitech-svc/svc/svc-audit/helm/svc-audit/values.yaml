replicaCount: 2

image:
  repository: sanitech/svc-audit
  pullPolicy: IfNotPresent
  tag: "1.0.0"

service:
  type: ClusterIP
  port: 8085

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  DB_URL: "jdbc:postgresql://postgres:5432/sanitech_audit"
  DB_USER: "sanitech"
  DB_PASSWORD: "sanitech"
  OAUTH2_ISSUER_URI: "http://keycloak:8081/realms/sanitech"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  AUDIT_INGESTION_TOPICS: "directory.events,consents.events"

probes:
  livenessPath: /actuator/health/liveness
  readinessPath: /actuator/health/readiness

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
