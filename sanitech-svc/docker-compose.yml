services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--http-port=8081", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/keycloak/realm-export:/opt/keycloak/data/import:ro
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  minio:
    image: minio/minio:RELEASE.2024-10-29T16-01-48Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "8025:8025"

  # =========================
  # Postgres (one per service)
  # =========================
  pg-directory:
    image: postgres:16
    environment:
      POSTGRES_DB: sanitech_directory
      POSTGRES_USER: sanitech
      POSTGRES_PASSWORD: sanitech
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanitech -d sanitech_directory"]
      interval: 10s
      timeout: 5s
      retries: 30

  pg-scheduling:
    image: postgres:16
    environment:
      POSTGRES_DB: sanitech_scheduling
      POSTGRES_USER: sanitech
      POSTGRES_PASSWORD: sanitech

  pg-admissions:
    image: postgres:16
    environment:
      POSTGRES_DB: sanitech_admissions
      POSTGRES_USER: sanitech
      POSTGRES_PASSWORD: sanitech

  pg-consents:
    image: postgres:16
    environment:
      POSTGRES_DB: sanitech_consents
      POSTGRES_USER: sanitech
      POSTGRES_PASSWORD: sanitech

  pg-docs:
    image: postgres:16
    environment:
      POSTGRES_DB: sanitech_docs
      POSTGRES_USER: sanitech
      POSTGRES_PASSWORD: sanitech

  pg-notifications:
    image: postgres:16
    environment:
      POSTGRES_DB: sanitech_notifications
      POSTGRES_USER: sanitech
      POSTGRES_PASSWORD: sanitech

  pg-audit:
    image: postgres:16
    environment:
      POSTGRES_DB: sanitech_audit
      POSTGRES_USER: sanitech
      POSTGRES_PASSWORD: sanitech

  pg-televisit:
    image: postgres:16
    environment:
      POSTGRES_DB: sanitech_televisit
      POSTGRES_USER: sanitech
      POSTGRES_PASSWORD: sanitech

  pg-payments:
    image: postgres:16
    environment:
      POSTGRES_DB: sanitech_payments
      POSTGRES_USER: sanitech
      POSTGRES_PASSWORD: sanitech

  pg-prescribing:
    image: postgres:16
    environment:
      POSTGRES_DB: sanitech_prescribing
      POSTGRES_USER: sanitech
      POSTGRES_PASSWORD: sanitech

  # =========================
  # Microservices
  # =========================
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      OAUTH2_ISSUER_URI: http://keycloak:8081/realms/sanitech
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8081/realms/sanitech
    depends_on:
      - keycloak

  svc-directory:
    build: ./svc-directory
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://pg-directory:5432/sanitech_directory
      DB_USER: sanitech
      DB_PASSWORD: sanitech
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OAUTH2_ISSUER_URI: http://keycloak:8081/realms/sanitech
    depends_on:
      - pg-directory
      - kafka
      - keycloak

  svc-scheduling:
    build: ./svc-scheduling
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:postgresql://pg-scheduling:5432/sanitech_scheduling
      DB_USER: sanitech
      DB_PASSWORD: sanitech
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OAUTH2_ISSUER_URI: http://keycloak:8081/realms/sanitech
    depends_on:
      - pg-scheduling
      - kafka
      - keycloak

  svc-admissions:
    build: ./svc-admissions
    ports:
      - "8084:8084"
    environment:
      DB_URL: jdbc:postgresql://pg-admissions:5432/sanitech_admissions
      DB_USER: sanitech
      DB_PASSWORD: sanitech
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OAUTH2_ISSUER_URI: http://keycloak:8081/realms/sanitech
    depends_on:
      - pg-admissions
      - kafka
      - keycloak

  svc-consents:
    build: ./svc-consents
    ports:
      - "8085:8085"
    environment:
      DB_URL: jdbc:postgresql://pg-consents:5432/sanitech_consents
      DB_USER: sanitech
      DB_PASSWORD: sanitech
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OAUTH2_ISSUER_URI: http://keycloak:8081/realms/sanitech
    depends_on:
      - pg-consents
      - kafka
      - keycloak

  svc-docs:
    build: ./svc-docs
    ports:
      - "8086:8086"
    environment:
      DB_URL: jdbc:postgresql://pg-docs:5432/sanitech_docs
      DB_USER: sanitech
      DB_PASSWORD: sanitech
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OAUTH2_ISSUER_URI: http://keycloak:8081/realms/sanitech
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_BUCKET: documents
    depends_on:
      - pg-docs
      - kafka
      - minio
      - keycloak

  svc-notifications:
    build: ./svc-notifications
    ports:
      - "8087:8087"
    environment:
      DB_URL: jdbc:postgresql://pg-notifications:5432/sanitech_notifications
      DB_USER: sanitech
      DB_PASSWORD: sanitech
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OAUTH2_ISSUER_URI: http://keycloak:8081/realms/sanitech
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    depends_on:
      - pg-notifications
      - kafka
      - mailhog
      - keycloak

  svc-audit:
    build: ./svc-audit
    ports:
      - "8088:8088"
    environment:
      DB_URL: jdbc:postgresql://pg-audit:5432/sanitech_audit
      DB_USER: sanitech
      DB_PASSWORD: sanitech
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OAUTH2_ISSUER_URI: http://keycloak:8081/realms/sanitech
    depends_on:
      - pg-audit
      - kafka
      - keycloak

  svc-televisit:
    build: ./svc-televisit
    ports:
      - "8089:8089"
    environment:
      DB_URL: jdbc:postgresql://pg-televisit:5432/sanitech_televisit
      DB_USER: sanitech
      DB_PASSWORD: sanitech
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OAUTH2_ISSUER_URI: http://keycloak:8081/realms/sanitech
      LIVEKIT_URL: ${LIVEKIT_URL:-https://your-livekit.example}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-change_me}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-change_me}
    depends_on:
      - pg-televisit
      - kafka
      - keycloak

  svc-payments:
    build: ./svc-payments
    ports:
      - "8090:8090"
    environment:
      DB_URL: jdbc:postgresql://pg-payments:5432/sanitech_payments
      DB_USER: sanitech
      DB_PASSWORD: sanitech
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OAUTH2_ISSUER_URI: http://keycloak:8081/realms/sanitech
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_change_me}
    depends_on:
      - pg-payments
      - kafka
      - keycloak

  svc-prescribing:
    build: ./svc-prescribing
    ports:
      - "8091:8091"
    environment:
      DB_URL: jdbc:postgresql://pg-prescribing:5432/sanitech_prescribing
      DB_USER: sanitech
      DB_PASSWORD: sanitech
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OAUTH2_ISSUER_URI: http://keycloak:8081/realms/sanitech
      CONSENTS_BASE_URL: http://svc-consents:8085
    depends_on:
      - pg-prescribing
      - kafka
      - keycloak
      - svc-consents
